        configuration: [Debug, Release]
    runs-on: windows-latest
    env:
      Project_Path: WpfApp1/WpfApp1.csproj
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore $env:Project_Path
      - name: Build
        run: dotnet build $env:Project_Path --configuration $env:Configuration --no-restore
        env:
          Configuration: ${{ matrix.configuration }}
      - name: Publish (Release only)
        if: matrix.configuration == 'Release'
        run: dotnet publish $env:Project_Path --configuration Release --runtime win-x64 --self-contained false --output publish
      - name: Upload build artifact
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: QuickDock-win-x64
          path: publish/
